# PRISM API Contract — Single Source of Truth
# All backend routes, frontend clients, and tests must align with this file.

version: "1.0.0"

config_keys:
  LLM_BASE_URL:
    description: Remote Ollama base URL via ngrok (empty = mock mode)
    required: false
    default: ""
  LLM_MODEL:
    description: Model name for chat completions
    required: false
    default: "llama3.2"
  DATABASE_URL:
    description: Async SQLAlchemy database URL
    required: true
    example: "postgresql+asyncpg://prism:prism@postgres:5432/prism"
  REDIS_URL:
    description: Redis connection URL
    required: true
    example: "redis://redis:6379/0"
  CHROMA_URL:
    description: ChromaDB HTTP endpoint
    required: true
    example: "http://chroma:8000"
  CV_ENABLED:
    description: Enable YOLOv8 live inference (false = mock CV mode)
    required: false
    default: "false"
  CV_MODEL:
    description: Ultralytics model name or path for live CV
    required: false
    default: "yolov8n.pt"
  NGROK_AUTH_TOKEN:
    description: ngrok auth token (Kaggle notebook only, not used locally)
    required: false
    kaggle_only: true

constants:
  risk_levels:
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL

  alert_statuses:
    - ACTIVE
    - ACKNOWLEDGED
    - RESOLVED

  event_types:
    - sensor_reading
    - permit_update
    - worker_location

  permit_types:
    - hot_work
    - confined_space
    - general

  permit_statuses:
    - active
    - expired
    - cancelled

  compound_rules:
    - id: HotWorkGasSpike
      description: Active hot-work permit + LEL above threshold in same zone
      default_severity: HIGH
    - id: ConfinedSpaceOccupancy
      description: Confined-space permit + worker present + O2 below threshold
      default_severity: CRITICAL
    - id: PermitZoneMismatch
      description: Worker location outside permitted zone polygon
      default_severity: MEDIUM

  risk_colors:
    LOW: "#22c55e"
    MEDIUM: "#eab308"
    HIGH: "#f97316"
    CRITICAL: "#ef4444"

  thresholds:
    lel_high: 15.0
    o2_low: 19.5
    alert_dedup_seconds: 300

  cv_hazard_colors:
    normal: "#22c55e"
    warning: "#f97316"
    critical: "#ef4444"

  cv_detection_labels:
    - person
    - no_hard_hat
    - no_safety_vest
    - welding_torch
    - fire
    - smoke

  cv_hazard_types:
    - PPE_VIOLATION
    - HOT_WORK_DETECTED
    - FIRE_SMOKE
    - UNAUTHORIZED_PERSON

redis_topics:
  events_ingest: prism.events.ingest
  alerts: prism.alerts
  risk: prism.risk

websocket:
  path: /ws/alerts
  events:
    - alert.created
    - alert.updated
    - risk.changed

endpoints:
  health:
    method: GET
    path: /api/v1/health
    response:
      status: string
      version: string
      llm_mode: string  # live | mock

  ingest_events:
    method: POST
    path: /api/v1/ingest/events
    request:
      events:
        type: array
        items:
          event_id: string
          event_type: string  # sensor_reading | permit_update | worker_location
          timestamp: string   # ISO 8601
          zone_id: string
          payload: object
    response:
      accepted: integer
      skipped: integer
      event_ids: array
      status: string  # accepted | duplicate

  sensors_latest:
    method: GET
    path: /api/v1/sensors/latest
    query:
      zone_id: string  # optional
      limit: integer   # optional, default 50
    response:
      readings: array
      count: integer
      events_ingested: integer
      last_event_at: string  # nullable ISO 8601

  risk_active:
    method: GET
    path: /api/v1/risk/active
    query:
      zone_id: string  # optional
    response:
      assessments: array
      count: integer

  alerts_active:
    method: GET
    path: /api/v1/alerts/active
    query:
      zone_id: string  # optional
    response:
      alerts: array
      count: integer

  alerts_ack:
    method: POST
    path: /api/v1/alerts/ack
    request:
      alert_id: string
      acknowledged_by: string  # optional
    response:
      alert_id: string
      status: string  # ACKNOWLEDGED

  map_layers:
    method: GET
    path: /api/v1/map/layers
    response:
      type: FeatureCollection
      risk_colors: object
      cv_hazard_colors: object
      layers:
        zones: object
        sensors: object
        workers: object
        permits: object
        cameras: object

  cv_samples:
    method: GET
    path: /api/v1/cv/samples
    response:
      samples: array
      count: integer

  cv_analyze:
    method: POST
    path: /api/v1/cv/analyze
    request:
      camera_id: string   # optional
      sample_id: string   # optional demo sample
      image_base64: string  # optional uploaded frame
    response:
      analysis_id: string
      camera_id: string   # nullable
      sample_id: string   # nullable
      cv_mode: string     # live | mock
      detections:
        type: array
        items:
          label: string
          confidence: float
          bbox: array       # normalized [x1, y1, x2, y2]
      hazards:
        type: array
        items:
          type: string
          severity: string
          message: string
      analyzed_at: string

  rag_query:
    method: POST
    path: /api/v1/rag/query
    request:
      query: string
      session_id: string  # optional
      top_k: integer        # optional, default 5
    response:
      answer: string
      sources:
        type: array
        items:
          document_id: string
          title: string
          excerpt: string
          score: float
      session_id: string
      llm_mode: string  # live | mock
      related_alerts: array
      related_incidents: array
