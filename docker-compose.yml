services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism}
      POSTGRES_DB: ${POSTGRES_DB:-prism}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://prism:prism@postgres:5432/prism}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CHROMA_URL: ${CHROMA_URL:-http://chroma:8000}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
      CV_ENABLED: ${CV_ENABLED:-false}
      CV_MODEL: ${CV_MODEL:-yolov8n.pt}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  simulator:
    profiles:
      - demo
    build:
      context: ./simulator
    env_file:
      - .env
    environment:
      PRISM_API_URL: http://backend:8000
      SCENARIO: compound_risk_demo
      SCENARIOS_DIR: /app/scenarios
    volumes:
      - ./simulator/scenarios:/app/scenarios:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
